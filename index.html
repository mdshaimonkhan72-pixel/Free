<!doctype html>
<html lang="bn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Free Fire Tools - Player Search</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <h1>Free Fire Tools</h1>
    <p class="tag">Player Search Demo</p>
  </header>

  <main class="container">
    <section class="search-card">
      <label for="uid">Enter Player UID</label>
      <input id="uid" placeholder="e.g. 123456789" />
      <button id="searchBtn">Search</button>
    </section>

    <section id="result" class="result-card" hidden>
      <!-- result will show here -->
    </section>
  </main>

  <footer class="site-footer">
    <small>Made for demo • Deploy on :contentReference[oaicite:2]{index=2}</small>
  </footer>
